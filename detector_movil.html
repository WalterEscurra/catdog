<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Detector Perro / Gato</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; margin: 0; }
    h1 { font-size: 1.5rem; margin-bottom: 10px; }
    #video { width: 100%; max-width: 400px; border-radius: 12px; background: #222; }
    #canvas { display: none; }
    button { background: #4CAF50; color: white; border: none; padding: 14px 28px; font-size: 1rem; border-radius: 8px; margin: 15px 0; cursor: pointer; }
    button:active { background: #388E3C; }
    #result { font-size: 1.8rem; font-weight: bold; margin-top: 10px; min-height: 40px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite@0.4.0/dist/tf-tflite.min.js"></script>
</head>
<body>
  <h1>🐾 Detector Perro vs Gato</h1>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <br><button id="btnDetect">📸 Capturar y Predecir</button>
  <p id="result">Esperando cámara...</p>
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btn = document.getElementById('btnDetect');
    const result = document.getElementById('result');
    const ctx = canvas.getContext('2d');
    let model = null;

    async function loadModel() {
      result.textContent = '⏳ Cargando modelo...';
      try {
        model = await window.tfjsTflite.loadTFLiteModel('cat_dog_model.tflite');
        result.textContent = '✅ Modelo cargado. Apunta a un animal.';
      } catch (e) { result.textContent = '❌ Error: modelo .tflite no encontrado.'; console.error(e); }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 320, height: 240 } });
        video.srcObject = stream;
      } catch (e) { result.textContent = '📷 Permiso de cámara denegado.'; }
    }

    btn.addEventListener('click', async () => {
      if (!model) return;
      result.textContent = '🔍 Analizando...';
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imgTensor = tf.browser.fromPixels(canvas).resizeNearestNeighbor([150, 150]).expandDims(0).toFloat().div(255.0);
      const output = model.predict(imgTensor);
      const score = output.dataSync()[0];
      imgTensor.dispose(); output.dispose();

      const label = score > 0.5 ? '🐶 PERRO' : '🐱 GATO';
      result.textContent = `${label} (${(score > 0.5 ? score : 1-score).toFixed(2)})`;
    });

    window.addEventListener('load', () => { startCamera(); loadModel(); });
  </script>
</body>
</html>
